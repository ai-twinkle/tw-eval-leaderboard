name: Deploy to Hugging Face Space

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Build project
        env:
          VITE_BASE_PATH: './'
        run: npm run build

      - name: Create Hugging Face Space README
        run: |
          cat << 'EOF' > dist/README.md
          ---
          title: Twinkle Evaluator Leaderboard
          emoji: 📊
          colorFrom: blue
          colorTo: indigo
          sdk: static
          pinned: false
          app_file: index.html
          license: mit
          short_description: Official Benchmark Leaderboard for Twinkle Eval
          ---
          EOF

      - name: Push to Hugging Face
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          cd dist

          git init -b main
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "Deploy from GitHub Actions (Commit: ${{ github.sha }})"

          git push -f https://user:$HF_TOKEN@huggingface.co/spaces/twinkle-ai/tw-eval-leaderboard main
